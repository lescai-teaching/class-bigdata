<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiny App</title>
    <script
      src="./shinylive/load-shinylive-sw.js"
      type="module"
    ></script>
    <script type="module">
      import { runExportedApp } from "./shinylive/shinylive.js";
      
      const resetKey = "shinylive-sw-reset-v1";
      
      async function unregisterOldShinyliveWorkers() {
        if (!("serviceWorker" in navigator)) return false;
        if (localStorage.getItem(resetKey) === "done") return false;
        
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(
          registrations.map((registration) => {
            const scriptUrl = registration.active?.scriptURL
              || registration.waiting?.scriptURL
              || registration.installing?.scriptURL
              || "";
            if (!scriptUrl.endsWith("/shinylive-sw.js")) return Promise.resolve(false);
            return registration.unregister();
          })
        );
        
        localStorage.setItem(resetKey, "done");
        window.location.reload();
        return true;
      }
      
      async function bootstrapApp() {
        if ("serviceWorker" in navigator) {
          if (await unregisterOldShinyliveWorkers()) {
            return;
          }
          await navigator.serviceWorker.ready;
          if (!navigator.serviceWorker.controller) {
            window.location.reload();
            return;
          }
        }
        
        runExportedApp({
          id: "root",
          appEngine: "r",
          relPath: "",
        });
      }
      
      bootstrapApp();
    </script>
    <link rel="stylesheet" href="./shinylive/style-resets.css" />
    <link rel="stylesheet" href="./shinylive/shinylive.css" />
    
  </head>
  <body>
    
    <div style="height: 100vh; width: 100vw" id="root"></div>
    
  </body>
</html>
